name: Build 3DS Game

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- FIX: Bulletproof tool downloading ---
      - name: Install CIA Tools Manually
        run: |
          echo "Downloading makerom..."
          wget -qO makerom.zip https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18/makerom-v0.18-ubuntu_x86_64.zip
          unzip -o makerom.zip
          chmod +x makerom
          cp makerom /usr/local/bin/

          echo "Downloading bannertool..."
          # Using the 'latest' tag so GitHub auto-finds the correct ZIP file
          wget -qO bannertool.zip https://github.com/Steveice10/bannertool/releases/latest/download/bannertool.zip
          unzip -o bannertool.zip
          chmod +x linux-x86_64/bannertool
          cp linux-x86_64/bannertool /usr/local/bin/

          echo "Downloading 3dstool..."
          # We need 3dstool to pack the audio/romfs folder into the CIA!
          wget -qO 3dstool.zip https://github.com/dnasdw/3dstool/releases/download/v1.2.6/3dstool-v1.2.6-linux-x86_64.zip
          unzip -o 3dstool.zip
          chmod +x 3dstool-v1.2.6-linux-x86_64/bin/3dstool
          cp 3dstool-v1.2.6-linux-x86_64/bin/3dstool /usr/local/bin/

      - name: Compile Game
        run: make

      - name: Upload Game Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DOORS_3DS_Build
          path: |
            *.3dsx
            *.elf
            *.cia
