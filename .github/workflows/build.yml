name: Build 3DS Game

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # The official image that actually exists!
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- NEW STEP: Installs makerom, bannertool, and 3dstool ---
      - name: Install CIA Packaging Tools
        run: dkp-pacman -Syu 3dstools --noconfirm

      - name: Compile Game
        run: make

      # --- UPDATED: Now grabs the .cia file too ---
      - name: Upload Game Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DOORS_3DS_Build
          path: |
            *.3dsx
            *.elf
            *.cia
