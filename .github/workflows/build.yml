name: Build 3DS Game

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install 3DS Dependencies
        # Removed the invalid '3ds-libcitro3d' package name.
        # '3ds-dev' includes everything we need!
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --needed --noconfirm 3ds-dev

      - name: Compile Game
        run: make

      - name: Upload 3DSX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOORS_3DS_Build
          path: |
            *.3dsx
            *.elf
