name: Build 3DS Game

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # --- CHANGED: Using the pre-loaded 3DS container! ---
    container: devkitpro/3dsdev:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # (We removed the dkp-pacman step completely)

      - name: Compile Game
        run: make

      - name: Upload Game Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DOORS_3DS_Build
          path: |
            *.3dsx
            *.elf
            *.cia
