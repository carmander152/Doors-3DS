name: Build 3DS Game

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Using the official DevkitPro container is best practice!
    container: devkitpro/devkitarm:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          # Added python3 and pip3 here so our bundling scripts work!
          apt-get install -y wget unzip zip make sox python3 python3-pip
          
          # Install Pillow for the texture atlas packer 
          # (--break-system-packages is often needed in modern containerized Ubuntu)
          pip3 install Pillow --break-system-packages

      - name: Install CIA Build Tools
        run: |
          echo "Downloading makerom v0.18..."
          wget -qO makerom.zip https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18/makerom-v0.18-ubuntu_x86_64.zip
          unzip -o makerom.zip
          chmod +x makerom
          cp makerom /usr/local/bin/

          echo "Downloading bannertool..."
          wget -qO bannertool.zip https://github.com/Epicpkmn11/bannertool/releases/download/v1.2.2/bannertool.zip
          unzip -o bannertool.zip
          chmod +x linux-x86_64/bannertool
          cp linux-x86_64/bannertool /usr/local/bin/

          echo "Downloading 3dstool..."
          wget -qO 3dstool.tar.gz https://github.com/dnasdw/3dstool/releases/download/v1.2.6/3dstool_linux_x86_64.tar.gz
          tar -xzf 3dstool.tar.gz
          chmod +x 3dstool
          cp 3dstool /usr/local/bin/
          
          echo "Patching 3dstool missing ignore file bug..."
          touch /usr/local/bin/ignore_3dstool.txt

      - name: Pre-process Textures and Bundle Source Code
        run: |
          mkdir -p raw_textures romfs source .github/scripts
          
          echo "Packing texture atlas..."
          python3 .github/scripts/pack_atlas.py
          
          echo "Converting atlas.png to 3DS format..."
          if [ -f "romfs/atlas.png" ]; then
            tex3ds -i romfs/atlas.png -o romfs/atlas.t3x
            rm romfs/atlas.png # Remove the raw PNG so it doesn't bloat the game file
          fi
          
          echo "Bundling C++ source code..."
          python3 .github/scripts/bundle.py

      - name: Build Game
        run: make

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DOORS_3DS_Build
          path: |
            Doors_3DS.3dsx
            Doors_3DS.elf
            Doors_3DS.cia
          if-no-files-found: error
