name: Build 3DS Game

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # THE MAGIC FIX: We use the 3DS-specific image instead of the base ARM one!
    container: devkitpro/3dsdev:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Game
        # No pacman downloads needed. Just build it!
        run: make

      - name: Upload 3DSX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOORS_3DS_Build
          path: |
            *.3dsx
            *.elf
