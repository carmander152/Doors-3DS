jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install 3DS Libraries
        run: |
          # Synchronize and install core 3DS development tools and libraries
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm 3ds-dev 3ds-libcitro3d

      - name: Compile
        run: make
