name: Build 3DS Game

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    # Environment variables for devkitPro tools
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          # ADDED: python3, pip, and dos2unix to your successful list
          apt-get install -y wget unzip zip make sox python3 python3-pip dos2unix
          # ADDED: Pillow for the python script
          pip3 install Pillow --break-system-packages

      - name: Sanitize External Files
        run: |
          # ADDED: This forcefully cleans your external scripts of Windows characters.
          # Using 'find' avoids the bash 'if' statement trap that caused the previous crash.
          find . -maxdepth 1 -name "Makefile" -exec dos2unix {} \;
          find .github/scripts -name "*.py" -exec dos2unix {} \;

      - name: Install CIA Build Tools
        run: |
          echo "Downloading makerom v0.18..."
          wget -qO makerom.zip https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18/makerom-v0.18-ubuntu_x86_64.zip
          unzip -o makerom.zip
          chmod +x makerom
          cp makerom /usr/local/bin/
          
          echo "Downloading bannertool..."
          wget -qO bannertool.zip https://github.com/Epicpkmn11/bannertool/releases/download/v1.2.2/bannertool.zip
          unzip -o bannertool.zip
          chmod +x linux-x86_64/bannertool
          cp linux-x86_64/bannertool /usr/local/bin/
          
          echo "Downloading 3dstool..."
          wget -qO 3dstool.tar.gz https://github.com/dnasdw/3dstool/releases/download/v1.2.6/3dstool_linux_x86_64.tar.gz
          tar -xzf 3dstool.tar.gz
          chmod +x 3dstool
          cp 3dstool /usr/local/bin/
          
          echo "Patching 3dstool missing ignore file bug..."
          touch /usr/local/bin/ignore_3dstool.txt

      - name: Pre-process Textures and Bundle Source Code
        run: |
          # ADDED: The new automated pipeline, written in flat commands.
          mkdir -p raw_textures romfs source .github/scripts
          
          python3 .github/scripts/pack_atlas.py
          
          # This 'find' command completely replaces the fragile 'if' statement.
          # It safely searches for atlas.png, converts it, and deletes the original.
          find romfs -name "atlas.png" -exec tex3ds -i {} -o romfs/atlas.t3x \; -exec rm {} \;
          
          python3 .github/scripts/bundle.py

      - name: Build Game
        run: make

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DOORS_3DS_Build
          path: |
            Doors_3DS.3dsx
            Doors_3DS.elf
            Doors_3DS.cia
          if-no-files-found: error
